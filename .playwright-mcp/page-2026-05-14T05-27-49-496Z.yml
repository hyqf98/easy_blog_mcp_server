                        - 'link "继承是面向对象程序设计中实现代码复用的最重要的手段。它不是在函数层面复用（比如写一个通用函数到处调用），而是在类的设计层面进行复用。我们可以在保持原有类特性的基础上，通过继承来扩展新类，增加新的成员变量和成员函数。新产生的类叫做派生类，也叫子类；被继承的类叫做基类，也叫父类。这种叫法源于翻译习惯，我们后面会混用这些称呼。class 派生类名 : 继承方式 基类名 {// 派生类新增的成员 };" [ref=e707] [cursor=pointer]':
