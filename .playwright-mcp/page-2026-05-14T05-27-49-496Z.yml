                        - link "摘要：JDK1.8的HotSpot虚拟机GC机制主要工作在堆内存区域，采用分代回收策略。新生代使用复制算法进行频繁的MinorGC（毫秒级），处理朝生夕死的对象；老年代采用标记清除/整理算法进行MajorGC（秒级），处理长期存活对象。引用类型分强/软/弱/虚四种，回收强度依次递减。G1收集器作为JDK9+的现代方案，通过区域化分代和混合回收避免FullGC。FullGC会清理整个堆空间，停顿时间最长，应尽量避免。可达性分析是判断对象存活的核心机制，与引用类型共同决定回收行为。" [ref=e852] [cursor=pointer]:
